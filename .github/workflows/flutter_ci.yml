name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  # Cancel previous runs for the same PR; fall back to ref for branch pushes.
  group: flutter-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hagz_kora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Run tests
        run: flutter test --coverage --reporter=expanded

      # TODO: re-enable at 80% once Phase 1 features are tested

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: ${{ !cancelled() }}
        with:
          # Path is repo-relative (not working-directory-relative).
          files: hagz_kora/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false
